<div class="d-flex flex-wrap mb-4">
    <h1 class="flex-grow-1" i18n="@@rapportPhaGDis.add.headline">Add Rapport Pha GDis</h1>
    <div>
        <a routerLink="/rapportPhaGDiss" class="btn btn-secondary" i18n="@@rapportPhaGDis.add.back">Back to list</a>
    </div>
</div>
<form [formGroup]="addForm" (ngSubmit)="handleSubmit()">
    <app-input-row [group]="addForm" field="name" i18n-label="@@rapportPhaGDis.name.label" label="Name" />
    <app-input-row [group]="addForm" field="created" rowType="datepicker" i18n-label="@@rapportPhaGDis.created.label" label="Created" />
    <app-input-row [group]="addForm" field="exportedDate" rowType="datepicker" i18n-label="@@rapportPhaGDis.exportedDate.label" label="Exported Date" />
    <input type="submit" i18n-value="@@rapportPhaGDis.add.headline" value="Add Rapport Pha GDis" class="btn btn-primary mt-4" />
</form>
