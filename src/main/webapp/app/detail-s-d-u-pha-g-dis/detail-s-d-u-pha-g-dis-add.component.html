<div class="d-flex flex-wrap mb-4">
    <h1 class="flex-grow-1" i18n="@@detailSDUPhaGDis.add.headline">Add Detail SDUPha GDis</h1>
    <div>
        <a routerLink="/detailSDUPhaGDiss" class="btn btn-secondary" i18n="@@detailSDUPhaGDis.add.back">Back to list</a>
    </div>
</div>
<form [formGroup]="addForm" (ngSubmit)="handleSubmit()">
    <app-input-row [group]="addForm" field="sdu" rowType="number" i18n-label="@@detailSDUPhaGDis.sdu.label" label="Sdu" />
    <app-input-row [group]="addForm" field="datePeremption" rowType="datepicker" i18n-label="@@detailSDUPhaGDis.datePeremption.label" label="Date Peremption" />
    <app-input-row [group]="addForm" field="detailSDU" rowType="select" [options]="detailSDUValues" i18n-label="@@detailSDUPhaGDis.detailSDU.label" label="Detail SDU" />
    <input type="submit" i18n-value="@@detailSDUPhaGDis.add.headline" value="Add Detail SDUPha GDis" class="btn btn-primary mt-4" />
</form>
