<div class="d-flex flex-wrap mb-4">
    <h1 class="flex-grow-1" i18n="@@programme.edit.headline">Edit Programme</h1>
    <div>
        <a routerLink="/programmes" class="btn btn-secondary" i18n="@@programme.edit.back">Back to list</a>
    </div>
</div>
<form [formGroup]="editForm" (ngSubmit)="handleSubmit()">
    <app-input-row [group]="editForm" field="id" rowType="number" i18n-label="@@programme.id.label" label="Id" />
    <app-input-row [group]="editForm" field="name" i18n-label="@@programme.name.label" label="Name" />
    <input type="submit" i18n-value="@@programme.edit.headline" value="Edit Programme" class="btn btn-primary mt-4" />
</form>
