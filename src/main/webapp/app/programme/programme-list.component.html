<div class="d-flex flex-wrap mb-4">
    <h1 class="flex-grow-1" i18n="@@programme.list.headline">Programmes</h1>
    <div>
        <a routerLink="/programmes/add" class="btn btn-primary ms-2" i18n="@@programme.list.createNew">Create new Programme</a>
    </div>
</div>
@if (!programmes || programmes.length === 0) {
<div i18n="@@programme.list.empty">No Programmes could be found.</div>
} @else {
<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead>
            <tr>
                <th scope="col" i18n="@@programme.id.label">Id</th>
                <th scope="col" i18n="@@programme.name.label">Name</th>
                <th><!-- --></th>
            </tr>
        </thead>
        <tbody>
            @for (programme of programmes; track programme.id) {
            <tr>
                <td>{{ programme.id }}</td>
                <td>{{ programme.name }}</td>
                <td>
                    <div class="float-end text-nowrap">
                        <a [routerLink]="['/programmes/edit', programme.id]" class="btn btn-sm btn-secondary" i18n="@@programme.list.edit">Edit</a>
                        <button type="button" (click)="confirmDelete(programme.id!)" class="btn btn-sm btn-secondary" i18n="@@programme.list.delete">Delete</button>
                    </div>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
}
