<div class="d-flex flex-wrap mb-4">
    <h1 class="flex-grow-1" i18n="@@produit.list.headline">Produits</h1>
    <div>
        <a routerLink="/produits/add" class="btn btn-primary ms-2" i18n="@@produit.list.createNew">Create new Produit</a>
    </div>
</div>
@if (!produits || produits.length === 0) {
<div i18n="@@produit.list.empty">No Produits could be found.</div>
} @else {
<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead>
            <tr>
                <th scope="col" i18n="@@produit.id.label">Id</th>
                <th scope="col" i18n="@@produit.name.label">Name</th>
                <th scope="col" i18n="@@produit.unit.label">Unit</th>
                <th scope="col" i18n="@@produit.code.label">Code</th>
                <th scope="col" i18n="@@produit.edited.label">Edited</th>
                <th><!-- --></th>
            </tr>
        </thead>
        <tbody>
            @for (produit of produits; track produit.id) {
            <tr>
                <td>{{ produit.id }}</td>
                <td>{{ produit.name }}</td>
                <td>{{ produit.unit }}</td>
                <td>{{ produit.code }}</td>
                <td>{{ produit.edited }}</td>
                <td>
                    <div class="float-end text-nowrap">
                        <a [routerLink]="['/produits/edit', produit.id]" class="btn btn-sm btn-secondary" i18n="@@produit.list.edit">Edit</a>
                        <button type="button" (click)="confirmDelete(produit.id!)" class="btn btn-sm btn-secondary" i18n="@@produit.list.delete">Delete</button>
                    </div>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
}
